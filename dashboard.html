<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0b0f1a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .card {
            background-color: #1a1f2e;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .symbol {
            font-size: 28px;
            font-weight: bold;
        }

        .price {
            margin: 10px 0;
        }

        .metric {
            margin: 5px 0;
        }

        .reason {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <h1>TradeLayer — Top Trade</h1>

    <div id="tradeCard" class="card">
        Loading trade...
    </div>

    <script>
        async function loadTrade() {
            const response = await fetch("http://127.0.0.1:8000/trade-scan");
            const data = await response.json();

            const trade = data.top_trade;

            if (!trade) {
                document.getElementById("tradeCard").innerHTML = "No trades found.";
                return;
            }

            document.getElementById("tradeCard").innerHTML = `
                <div class="symbol">${trade.symbol}</div>

                <div class="price">Entry: $${trade.entry}</div>
                <div class="metric">Target: $${trade.target}</div>
                <div class="metric">Stop: $${trade.stop_loss}</div>

                <div class="metric">Risk/Reward: ${trade.risk_reward}</div>
                <div class="metric">Score: ${trade.score}</div>
                <div class="metric">Confidence: ${trade.confidence}</div>

                <div class="reason">${trade.reason}</div>
            `;
        }

        loadTrade();
    </script>

</body>
</html>
