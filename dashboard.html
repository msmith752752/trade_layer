<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        :root {
            --bg: #0b0f1a;
            --card: #151b2b;
            --card-soft: #0f1523;
            --border: #263044;
            --text: #ffffff;
            --muted: #9ca3af;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #facc15;
            --blue: #3b82f6;
            --purple: #a78bfa;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 35px;
        }

        .container {
            max-width: 1380px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--muted);
            margin-top: 8px;
        }

        .status-pill {
            background: #0f1523;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 12px;
            white-space: nowrap;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        .symbol {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 4px;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            margin-bottom: 20px;
        }

        .badge {
            background: #1f2937;
            color: #d1d5db;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.green-bg {
            background: rgba(34,197,94,0.14);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.25);
        }

        .badge.red-bg {
            background: rgba(239,68,68,0.14);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.25);
        }

        .badge.yellow-bg {
            background: rgba(250,204,21,0.12);
            color: var(--yellow);
            border: 1px solid rgba(250,204,21,0.22);
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .metric-grid.two {
            grid-template-columns: repeat(2, 1fr);
        }

        .metric-grid.three {
            grid-template-columns: repeat(3, 1fr);
        }

        .metric {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .green { color: var(--green); }
        .red { color: var(--red); }
        .yellow { color: var(--yellow); }
        .blue { color: var(--blue); }
        .purple { color: var(--purple); }

        .section-title {
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: bold;
        }

        .section-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: -6px;
            margin-bottom: 16px;
            line-height: 1.45;
        }

        .why-box {
            background: var(--card-soft);
            border-left: 4px solid var(--blue);
            padding: 16px;
            border-radius: 10px;
            margin-top: 18px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .row-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .row-symbol {
            font-weight: bold;
            font-size: 17px;
        }

        .row-score {
            font-weight: bold;
        }

        .small {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .top-opportunities {
            margin-bottom: 22px;
        }

        .opportunity-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .portfolio-section {
            margin-bottom: 22px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .portfolio-card {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }

        .portfolio-card-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .account-name {
            font-size: 18px;
            font-weight: bold;
        }

        .portfolio-score-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 14px 0;
        }

        .mini-metric {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }

        .driver-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .driver-box strong {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        .account-position-group {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .account-position-group:last-child {
            margin-bottom: 0;
        }

        .account-position-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .account-position-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .account-position-title {
            font-size: 18px;
            font-weight: bold;
        }

        .account-position-summary {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .account-position-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(110px, 1fr));
            gap: 10px;
            min-width: 360px;
        }

        .account-position-metric {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 10px;
        }

        .account-position-metric .label {
            margin-bottom: 5px;
            font-size: 10px;
        }

        .account-position-metric .value {
            font-size: 17px;
        }

        .recommendation-box {
            margin-top: 12px;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.18);
        }

        .recommendation-box strong {
            display: block;
            margin-bottom: 6px;
            color: var(--blue);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table.grouped {
            min-width: 720px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-top: 22px;
        }

        .positions-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 22px;
            margin-top: 22px;
        }

        .risk-field {
            margin-bottom: 14px;
        }

        .risk-field label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-input {
            width: 100%;
            padding: 12px;
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .risk-button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .risk-button:hover {
            opacity: 0.92;
        }

        .empty-state {
            background: var(--card-soft);
            border: 1px dashed var(--border);
            color: var(--muted);
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.5;
        }

        .table-wrap {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 820px;
        }

        .table.compact {
            min-width: 560px;
        }

        .table th {
            color: var(--muted);
            font-weight: normal;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(38,48,68,0.65);
        }

        .table tr:last-child td {
            border-bottom: none;
        }

        @media(max-width: 1100px) {
            .main-grid,
            .bottom-grid,
            .positions-grid,
            .opportunity-grid,
            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            .metric-grid,
            .metric-grid.two,
            .metric-grid.three {
                grid-template-columns: repeat(2, 1fr);
            }

            .header {
                flex-direction: column;
            }

            .account-position-header {
                flex-direction: column;
            }

            .account-position-metrics {
                min-width: 0;
                width: 100%;
            }
        }

        @media(max-width: 650px) {
            body {
                padding: 18px;
            }

            .metric-grid,
            .metric-grid.two,
            .metric-grid.three,
            .portfolio-score-row {
                grid-template-columns: 1fr;
            }

            .symbol {
                font-size: 38px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <div>
            <h1>TradeLayer</h1>
            <p>Market interpretation + trade management workstation</p>
        </div>
        <div id="refreshStatus" class="status-pill">Loading market scan...</div>
    </div>

    <div id="dashboard"></div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function loadDashboard() {
    try {
        const scanData = await fetchJson(`${API_BASE}/trade-scan`);
        const tradeLogData = await fetchJson(`${API_BASE}/trade-log`, { optional: true });
        const portfolioData = await fetchJson(`${API_BASE}/portfolio`, { optional: true });
        const portfolioAnalysisData = await fetchJson(`${API_BASE}/portfolio-analysis`, { optional: true });
        const performanceData = await fetchJson(`${API_BASE}/performance`, { optional: true });

        const top = scanData.top_trade;

        if (!top) {
            document.getElementById("dashboard").innerHTML =
                "<div class='card'>No trades found.</div>";
            updateRefreshStatus();
            return;
        }

        renderDashboard(scanData, tradeLogData, portfolioData, portfolioAnalysisData, performanceData);
        calculateRisk(top.entry, top.stop_loss, top.symbol);
        updateRefreshStatus();

    } catch (error) {
        console.error(error);
        document.getElementById("dashboard").innerHTML = `
            <div class="card">
                <div class="section-title">Unable to load TradeLayer</div>
                <div class="small">
                    Make sure the backend is running at ${API_BASE}.<br><br>
                    Expected command:<br>
                    <strong>python -m uvicorn app.main:app --reload</strong>
                </div>
            </div>
        `;
        document.getElementById("refreshStatus").textContent = "Backend not connected";
    }
}

async function fetchJson(url, options = {}) {
    try {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`${url} returned ${response.status}`);
        }

        return await response.json();

    } catch (error) {
        if (options.optional) {
            console.warn(`Optional endpoint unavailable: ${url}`, error);
            return null;
        }
        throw error;
    }
}

function renderDashboard(scanData, tradeLogData, portfolioData, portfolioAnalysisData, performanceData) {
    const top = scanData.top_trade;
    const rsClass = getRsClass(top.relative_strength_vs_spy);
    const environmentClass = getEnvironmentClass(top.market_state);

    document.getElementById("dashboard").innerHTML = `
        <div class="main-grid">
            <div class="card">
                <div class="symbol">${safe(top.symbol)}</div>
                <div class="subtitle">${safe(top.market_state)}</div>

                <div class="badge-row">
                    <div class="badge ${environmentClass}">${safe(top.action_label)}</div>
                    <div class="badge">${safe(top.recommended_strategy)}</div>
                    <div class="badge">Options: ${safe(top.options_pressure)}</div>
                </div>

                <div class="metric-grid">
                    <div class="metric">
                        <div class="label">Entry</div>
                        <div class="value">${formatCurrency(top.entry)}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Target</div>
                        <div class="value green">${formatCurrency(top.target)}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Stop</div>
                        <div class="value red">${formatCurrency(top.stop_loss)}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Trade Score</div>
                        <div class="value">${safe(top.score)}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Relative Strength vs SPY</div>
                        <div class="value ${rsClass}">
                            ${formatPercent(top.relative_strength_vs_spy)}
                        </div>
                    </div>

                    <div class="metric">
                        <div class="label">Expected Hold</div>
                        <div class="value">${safe(top.expected_hold)}</div>
                    </div>
                </div>

                <div class="why-box">
                    <div class="section-title">Why This Strategy</div>
                    ${renderReasonList(top.strategy_reason)}
                </div>
            </div>

            <div class="card">
                <div class="section-title">Risk Management</div>
                <div class="section-subtitle">
                    Environment-aware sizing using account value, max risk, entry, stop, market state, and exposure caps.
                </div>

                <div class="risk-field">
                    <label for="accountValue">Account Value ($)</label>
                    <input id="accountValue" class="risk-input" type="number" value="25000">
                </div>

                <div class="risk-field">
                    <label for="riskPercent">Max Risk Per Trade (%)</label>
                    <input id="riskPercent" class="risk-input" type="number" value="2">
                </div>

                <button
                    class="risk-button"
                    onclick="calculateRisk(${Number(top.entry)}, ${Number(top.stop_loss)}, '${safe(top.symbol)}')"
                >
                    Calculate Position Size
                </button>

                <div id="riskResults"></div>
            </div>
        </div>

        <div class="card top-opportunities">
            <div class="section-title">Top Opportunities</div>
            <div class="section-subtitle">
                Highest-ranked setups after trend, momentum, liquidity, options pressure, regime, and RS vs SPY filters.
            </div>

            <div class="opportunity-grid">
                ${renderOpportunityCards(scanData.trade_opportunities || [])}
            </div>
        </div>

        ${renderPortfolioAnalysis(portfolioAnalysisData)}

        <div class="positions-grid">
            <div class="card">
                <div class="section-title">Open Positions</div>
                <div class="section-subtitle">
                    Live unrealized P/L calculated from current market price, share count, and cost basis.
                </div>
                ${renderOpenPositions(tradeLogData, portfolioData, portfolioAnalysisData)}
            </div>

            <div class="card">
                <div class="section-title">Closed Trades</div>
                <div class="section-subtitle">
                    Completed trades and realized P/L summary.
                </div>
                ${renderClosedTrades(tradeLogData, performanceData)}
            </div>
        </div>

        <div class="bottom-grid">
            <div class="card">
                <div class="section-title">Watchlist</div>
                <div class="section-subtitle">
                    Names with potential, but not yet strong enough for top-trade status.
                </div>

                <div class="list">
                    ${renderRows(scanData.watchlist || [])}
                </div>
            </div>

            <div class="card">
                <div class="section-title">Avoid / Weak Environment</div>
                <div class="section-subtitle">
                    Strong names can still be poor trades if the environment is unstable or overextended.
                </div>

                <div class="list">
                    ${renderRows(scanData.avoid || [])}
                </div>
            </div>
        </div>
    `;
}

function renderPortfolioAnalysis(data) {
    const accounts = data?.portfolio_analyses || [];

    if (!accounts.length) {
        return `
            <div class="card portfolio-section">
                <div class="section-title">Portfolio Intelligence</div>
                <div class="empty-state">
                    Portfolio analysis unavailable. Confirm /portfolio-analysis is running.
                </div>
            </div>
        `;
    }

    return `
        <div class="card portfolio-section">
            <div class="section-title">Portfolio Intelligence</div>
            <div class="section-subtitle">
                Account-level health, stability, concentration, defensive reserves, and speculative exposure.
            </div>

            <div class="portfolio-grid">
                ${accounts.map(renderAccountCard).join("")}
            </div>
        </div>
    `;
}

function renderAccountCard(account) {
    const healthClass = getHealthClass(account.portfolio_health_label);
    const stabilityClass = getStabilityClass(account.portfolio_stability_label);
    const concentrationClass = getConcentrationClass(account.concentration_label);

    const positions = account.positions || [];

    let portfolioMode = "real";

    if (positions.length > 0) {
        portfolioMode = positions[0].portfolio_mode || "real";
    }

    const modeBadge =
        portfolioMode === "paper"
            ? `<div class="badge purple">SIMULATION</div>`
            : `<div class="badge green-bg">REAL CAPITAL</div>`;

    return `
        <div class="portfolio-card">
            <div class="portfolio-card-top">
                <div>
                    <div class="account-name">${safe(account.account)}</div>
                    <div class="small">${formatCurrency(account.total_value)} total value</div>
                </div>

                <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                    ${modeBadge}

                    <div class="badge ${stabilityClass}">
                        ${safe(account.portfolio_stability_label)}
                    </div>
                </div>
            </div>

            <div class="badge-row">
                <div class="badge ${healthClass}">
                    Health: ${safe(account.portfolio_health_label)}
                </div>

                <div class="badge ${concentrationClass}">
                    ${safe(account.concentration_label)}
                </div>
            </div>

            <div class="portfolio-score-row">
                <div class="mini-metric">
                    <div class="label">Health Score</div>

                    <div class="value ${healthClass.replace("-bg", "")}">
                        ${safe(account.portfolio_health_score)}
                    </div>
                </div>

                <div class="mini-metric">
                    <div class="label">Stability Score</div>

                    <div class="value ${stabilityClass.replace("-bg", "")}">
                        ${safe(account.portfolio_stability_score)}
                    </div>
                </div>
            </div>

            <div class="metric-grid three">
                <div class="metric">
                    <div class="label">Defensive</div>
                    <div class="value blue">
                        ${formatPercent(account.bucket_percents?.defensive)}
                    </div>
                </div>

                <div class="metric">
                    <div class="label">Speculative</div>
                    <div class="value yellow">
                        ${formatPercent(account.bucket_percents?.speculative)}
                    </div>
                </div>

                <div class="metric">
                    <div class="label">Largest</div>

                    <div class="value">
                        ${safe(account.largest_position?.symbol)}
                    </div>

                    <div class="small">
                        ${formatPercent(account.largest_position?.percent)}
                    </div>
                </div>
            </div>

            <div class="driver-box">
                <strong class="green">Stability Drivers</strong>
                ${renderMiniList(account.stability_drivers)}
            </div>

            <div class="driver-box">
                <strong class="red">Instability Drivers</strong>
                ${renderMiniList(account.instability_drivers)}
            </div>

            <div class="driver-box">
                <strong class="yellow">Warnings</strong>
                ${renderMiniList(account.warnings)}
            </div>
        </div>
    `;
}

async function calculateRisk(entry, stop, symbol = "") {
    try {
        const accountValue = document.getElementById("accountValue").value;
        const riskPercent = document.getElementById("riskPercent").value;

        const symbolParam = symbol ? `&symbol=${encodeURIComponent(symbol)}` : "";

        const data = await fetchJson(
            `${API_BASE}/risk-plan?account_value=${accountValue}&risk_percent=${riskPercent}&entry_price=${entry}&stop_price=${stop}${symbolParam}`
        );

        document.getElementById("riskResults").innerHTML = `
            <div class="metric-grid two">
                <div class="metric">
                    <div class="label">Allowed Risk</div>
                    <div class="value red">${formatCurrency(data.allowed_risk_dollars)}</div>
                </div>

                <div class="metric">
                    <div class="label">Suggested Shares</div>
                    <div class="value">${safe(data.suggested_shares)}</div>
                </div>

                <div class="metric">
                    <div class="label">Estimated Max Loss</div>
                    <div class="value red">${formatCurrency(data.estimated_max_loss)}</div>
                </div>

                <div class="metric">
                    <div class="label">Risk / Share</div>
                    <div class="value">${formatCurrency(data.risk_per_share)}</div>
                </div>

                <div class="metric">
                    <div class="label">Account Exposure</div>
                    <div class="value yellow">${formatPercent(data.position_exposure_percent)}</div>
                </div>

                <div class="metric">
                    <div class="label">Environment</div>
                    <div class="value blue">${safe(data.environment_label)}</div>
                </div>
            </div>

            <div class="empty-state">
                ${safe(data.risk_summary)}
                ${data.warnings?.length ? `<br><br>${data.warnings.map(w => `• ${safe(w)}`).join("<br>")}` : ""}
            </div>
        `;
    } catch (error) {
        console.error(error);
        document.getElementById("riskResults").innerHTML = `
            <div class="empty-state">
                Risk calculator unavailable. Confirm the /risk-plan endpoint is running.
            </div>
        `;
    }
}

function renderOpenPositions(tradeLogData, portfolioData, portfolioAnalysisData) {
    const portfolioPositions = normalizeArray(portfolioData?.open_positions || portfolioData?.positions);
    const loggedTrades = normalizeTradeLog(tradeLogData);

    const openItems = portfolioPositions.length > 0
        ? portfolioPositions
        : loggedTrades.filter(t => isOpenTrade(t));

    if (openItems.length === 0) {
        return `<div class="empty-state">No open positions found yet.</div>`;
    }

    const openPL = portfolioData?.open_pl;
    const openPLPercent = portfolioData?.open_pl_percent;
    const marketValue = portfolioData?.market_value;
    const openBasis = portfolioData?.open_basis;

    const analysisByAccount = buildAnalysisByAccount(portfolioAnalysisData);
    const grouped = groupPositionsByAccount(openItems);

    return `
        <div class="metric-grid three">
            <div class="metric">
                <div class="label">Open P/L</div>
                <div class="value ${getPnlClass(openPL)}">${formatCurrencyOrDash(openPL)}</div>
            </div>

            <div class="metric">
                <div class="label">Open P/L %</div>
                <div class="value ${getPnlClass(openPLPercent)}">${formatPercent(openPLPercent)}</div>
            </div>

            <div class="metric">
                <div class="label">Market Value</div>
                <div class="value">${formatCurrencyOrDash(marketValue)}</div>
            </div>
        </div>

        <div class="small" style="margin-bottom: 12px;">
            Cost basis tracked: ${formatCurrencyOrDash(openBasis)}
        </div>

        <div class="list">
            ${Object.entries(grouped).map(([accountName, items]) => {
                const analysis = analysisByAccount[accountName] || null;
                return renderAccountPositionGroup(accountName, items, analysis);
            }).join("")}
        </div>
    `;
}

function renderAccountPositionGroup(accountName, items, analysis) {
    const stats = calculateAccountPositionStats(items);
    const mode = getAccountModeFromPositions(items, analysis);
    const modeBadge = renderModeBadge(mode);
    const recommendationLabel = analysis?.account_recommendation_label;
    const recommendation = analysis?.account_recommendation;
    const recommendationReason = analysis?.account_recommendation_reason;

    return `
        <div class="account-position-group">
            <div class="account-position-header">
                <div>
                    <div class="account-position-title-row">
                        <div class="account-position-title">${safe(accountName)}</div>
                        ${modeBadge}
                        ${recommendationLabel ? `<div class="badge ${getRecommendationClass(recommendationLabel)}">${safe(recommendationLabel)}</div>` : ""}
                    </div>

                    <div class="account-position-summary">
                        ${items.length} open position${items.length === 1 ? "" : "s"}
                        ${analysis?.portfolio_stability_label ? ` • ${safe(analysis.portfolio_stability_label)} stability` : ""}
                        ${analysis?.concentration_label ? ` • ${safe(analysis.concentration_label)}` : ""}
                    </div>
                </div>

                <div class="account-position-metrics">
                    <div class="account-position-metric">
                        <div class="label">Value</div>
                        <div class="value">${formatCurrencyOrDash(stats.marketValue)}</div>
                    </div>

                    <div class="account-position-metric">
                        <div class="label">Open P/L</div>
                        <div class="value ${getPnlClass(stats.openPL)}">${formatCurrencyOrDash(stats.openPL)}</div>
                    </div>

                    <div class="account-position-metric">
                        <div class="label">Open P/L %</div>
                        <div class="value ${getPnlClass(stats.openPLPercent)}">${formatPercent(stats.openPLPercent)}</div>
                    </div>
                </div>
            </div>

            ${recommendation ? `
                <div class="recommendation-box">
                    <strong>Account Recommendation</strong>
                    <div class="small">
                        <span class="${getRecommendationTextClass(recommendationLabel)}">${safe(recommendation)}</span>
                        ${recommendationReason ? ` — ${safe(recommendationReason)}` : ""}
                    </div>
                </div>
            ` : ""}

            <div class="table-wrap">
                <table class="table grouped">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Qty</th>
                            <th>Cost</th>
                            <th>Current</th>
                            <th>Value</th>
                            <th>P/L</th>
                            <th>P/L %</th>
                            <th>Guidance</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(item => {
                            const pnl = getFirstValue(item, ["unrealized_pl", "unrealized_p_l", "p_l", "pl", "unrealized"]);
                            const pnlPercent = getFirstValue(item, ["unrealized_pl_percent", "p_l_percent", "pl_percent"]);

                            return `
                                <tr>
                                    <td><strong>${safe(item.symbol)}</strong></td>
                                    <td>${formatShares(getFirstValue(item, ["shares", "quantity", "qty"], "—"))}</td>
                                    <td>${formatCurrency(getFirstValue(item, ["cost_basis", "entry", "price", "buy_price"]))}</td>
                                    <td>${formatCurrencyOrDash(getFirstValue(item, ["current_price", "current", "last_price"]))}</td>
                                    <td>${formatCurrencyOrDash(getFirstValue(item, ["market_value", "position_value", "value"]))}</td>
                                    <td class="${getPnlClass(pnl)}">${formatCurrencyOrDash(pnl)}</td>
                                    <td class="${getPnlClass(pnlPercent)}">${formatPercent(pnlPercent)}</td>
                                    <td>${safe(getPositionGuidance(item, pnl))}</td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function buildAnalysisByAccount(portfolioAnalysisData) {
    const accounts = portfolioAnalysisData?.portfolio_analyses || [];
    const map = {};

    accounts.forEach(account => {
        if (account.account) {
            map[account.account] = account;
        }
    });

    return map;
}

function groupPositionsByAccount(items) {
    const grouped = {};

    items.forEach(item => {
        const accountName = getFirstValue(item, ["account", "account_type"], "Uncategorized");

        if (!grouped[accountName]) {
            grouped[accountName] = [];
        }

        grouped[accountName].push(item);
    });

    return Object.fromEntries(
        Object.entries(grouped).sort(([accountA], [accountB]) => {
            const orderA = getAccountSortRank(accountA);
            const orderB = getAccountSortRank(accountB);

            if (orderA !== orderB) {
                return orderA - orderB;
            }

            return accountA.localeCompare(accountB);
        })
    );
}

function getAccountSortRank(accountName) {
    const text = String(accountName || "").toLowerCase();

    if (text.includes("ira 823")) return 1;
    if (text.includes("roth")) return 2;
    if (text.includes("individual")) return 3;
    if (text.includes("hsa")) return 4;
    if (text.includes("paper")) return 5;

    return 9;
}

function calculateAccountPositionStats(items) {
    let marketValue = 0;
    let openPL = 0;
    let basis = 0;

    items.forEach(item => {
        const value = Number(getFirstValue(item, ["market_value", "position_value", "value"], 0));
        const pnl = Number(getFirstValue(item, ["unrealized_pl", "unrealized_p_l", "p_l", "pl", "unrealized"], 0));
        const totalBasis = Number(getFirstValue(item, ["total_basis", "cost_basis_total"], null));
        const shares = Math.abs(Number(getFirstValue(item, ["shares", "quantity", "qty"], 0)));
        const cost = Number(getFirstValue(item, ["cost_basis", "entry", "price", "buy_price"], 0));

        if (!Number.isNaN(value)) {
            marketValue += value;
        }

        if (!Number.isNaN(pnl)) {
            openPL += pnl;
        }

        if (totalBasis !== null && !Number.isNaN(totalBasis)) {
            basis += Math.abs(totalBasis);
        } else if (!Number.isNaN(shares) && !Number.isNaN(cost)) {
            basis += shares * cost;
        }
    });

    const openPLPercent = basis ? (openPL / basis) * 100 : 0;

    return {
        marketValue,
        openPL,
        openPLPercent,
        basis,
    };
}

function getAccountModeFromPositions(items, analysis) {
    if (analysis?.portfolio_mode) {
        return analysis.portfolio_mode;
    }

    for (const item of items) {
        if (item.portfolio_mode) {
            return item.portfolio_mode;
        }
    }

    return "real";
}

function renderModeBadge(mode) {
    return String(mode).toLowerCase() === "paper"
        ? `<div class="badge purple">SIMULATION</div>`
        : `<div class="badge green-bg">REAL CAPITAL</div>`;
}

function getRecommendationClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("reduce") || text.includes("avoid") || text.includes("raise")) {
        return "red-bg";
    }

    if (text.includes("monitor") || text.includes("rebalance")) {
        return "yellow-bg";
    }

    return "green-bg";
}

function getRecommendationTextClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("reduce") || text.includes("avoid") || text.includes("raise")) {
        return "red";
    }

    if (text.includes("monitor") || text.includes("rebalance")) {
        return "yellow";
    }

    return "green";
}

function renderClosedTrades(tradeLogData, performanceData) {
    const loggedTrades = normalizeTradeLog(tradeLogData);
    const closedItems = loggedTrades.filter(t => isClosedTrade(t));

    let totalRealized = getFirstValue(
        performanceData || {},
        ["total_realized_pl", "realized_pl", "total_pl", "total_p_l"],
        null
    );

    const calculatedRealized = closedItems.reduce((sum, trade) => {
        const pnl = Number(getFirstValue(trade, ["realized_pl", "realized_p_l", "p_l", "pl"], 0));
        return Number.isNaN(pnl) ? sum : sum + pnl;
    }, 0);

    if (totalRealized === null || Number(totalRealized) === 0) {
        totalRealized = calculatedRealized;
    }

    if (closedItems.length === 0 && totalRealized === null) {
        return `<div class="empty-state">No closed trades found yet.</div>`;
    }

    return `
        <div class="metric-grid two">
            <div class="metric">
                <div class="label">Realized P/L</div>
                <div class="value ${getPnlClass(totalRealized)}">${formatCurrencyOrDash(totalRealized)}</div>
            </div>

            <div class="metric">
                <div class="label">Closed Trades</div>
                <div class="value">${closedItems.length}</div>
            </div>
        </div>

        ${closedItems.length > 0 ? `
            <div class="table-wrap">
                <table class="table compact">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Symbol</th>
                            <th>Exit</th>
                            <th>Realized P/L</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${closedItems.map(item => {
                            const pnl = getFirstValue(item, ["realized_pl", "realized_p_l", "p_l", "pl"]);
                            return `
                                <tr>
                                    <td>${safe(getFirstValue(item, ["account", "account_type"], "—"))}</td>
                                    <td><strong>${safe(item.symbol)}</strong></td>
                                    <td>${formatCurrency(getFirstValue(item, ["sale_price", "sell_price", "exit_price", "exit", "price"]))}</td>
                                    <td class="${getPnlClass(pnl)}">${formatCurrencyOrDash(pnl)}</td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
            </div>
        ` : ""}
    `;
}

function renderOpportunityCards(items) {
    if (!items || items.length === 0) {
        return `<div class="empty-state">No top opportunities returned.</div>`;
    }

    return items.slice(0, 4).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${safe(item.symbol)}</div>
                    <div class="row-score">${safe(item.score)}</div>
                </div>

                <div class="small">${safe(item.market_state)}</div>
                <div class="small">${safe(item.recommended_strategy)}</div>

                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${formatPercent(item.relative_strength_vs_spy)}
                    </span>
                </div>

                <div class="small">
                    Entry: ${formatCurrency(item.entry)}
                    |
                    Target: ${formatCurrency(item.target)}
                </div>
            </div>
        `;
    }).join("");
}

function renderRows(items) {
    if (!items || items.length === 0) {
        return `<div class="empty-state">No names returned for this section.</div>`;
    }

    return items.slice(0, 6).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${safe(item.symbol)}</div>
                    <div class="row-score">${safe(item.score)}</div>
                </div>

                <div class="small">${safe(item.market_state)}</div>
                <div class="small">${safe(item.recommended_strategy)}</div>

                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${formatPercent(item.relative_strength_vs_spy)}
                    </span>
                </div>
            </div>
        `;
    }).join("");
}

function renderReasonList(reasons) {
    if (!reasons || reasons.length === 0) {
        return `<div class="small">No strategy explanation returned yet.</div>`;
    }

    return reasons.map(r => `<div class="small">• ${safe(r)}</div>`).join("");
}

function renderMiniList(items) {
    if (!items || items.length === 0) {
        return `<div class="small">—</div>`;
    }

    return items.slice(0, 3).map(item => `<div class="small">• ${safe(item)}</div>`).join("");
}

function normalizeTradeLog(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (Array.isArray(data.trades)) return data.trades;
    if (Array.isArray(data.trade_log)) return data.trade_log;

    if (Array.isArray(data.open_trades) || Array.isArray(data.closed_trades)) {
        return [
            ...(data.open_trades || []),
            ...(data.closed_trades || [])
        ];
    }

    return [];
}

function normalizeArray(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value;
    return [];
}

function isOpenTrade(trade) {
    const status = String(getFirstValue(trade, ["status", "trade_status"], "")).toLowerCase();
    const action = String(getFirstValue(trade, ["action"], "")).toLowerCase();

    if (status.includes("open")) return true;
    if (status.includes("closed")) return false;
    if (action.includes("buy") && !action.includes("sell")) return true;

    return false;
}

function isClosedTrade(trade) {
    const status = String(getFirstValue(trade, ["status", "trade_status"], "")).toLowerCase();
    const action = String(getFirstValue(trade, ["action"], "")).toLowerCase();
    const realized = getFirstValue(trade, ["realized_pl", "realized_p_l", "p_l", "pl"], null);

    if (status.includes("closed")) return true;
    if (action.includes("sell")) return true;
    if (realized !== null && realized !== undefined) return true;

    return false;
}

function getPositionGuidance(item, pnl) {
    const guidance = getFirstValue(item, ["guidance", "position_guidance", "recommendation"]);

    if (guidance) return guidance;

    const pnlNumber = Number(pnl);

    if (!Number.isNaN(pnlNumber)) {
        if (pnlNumber > 0) return "hold_position / monitor target";
        if (pnlNumber < 0) return "review stop / avoid adding";
    }

    return "hold_position / monitor setup";
}

function getFirstValue(object, keys, fallback = null) {
    if (!object) return fallback;

    for (const key of keys) {
        if (object[key] !== undefined && object[key] !== null && object[key] !== "") {
            return object[key];
        }
    }

    return fallback;
}

function getRsClass(value) {
    const number = Number(value);
    if (number >= 1) return "green";
    if (number <= -1) return "red";
    return "yellow";
}

function getPnlClass(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "";
    if (number > 0) return "green";
    if (number < 0) return "red";
    return "yellow";
}

function getEnvironmentClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("unstable") || text.includes("avoid") || text.includes("high_risk")) {
        return "red-bg";
    }

    if (text.includes("watch") || text.includes("neutral") || text.includes("mixed")) {
        return "yellow-bg";
    }

    return "green-bg";
}

function getHealthClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("strong") || text.includes("stable")) return "green-bg";
    if (text.includes("mixed") || text.includes("elevated")) return "yellow-bg";
    if (text.includes("high risk")) return "red-bg";

    return "";
}

function getStabilityClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("highly stable") || text === "stable") return "green-bg";
    if (text.includes("moderately")) return "yellow-bg";
    if (text.includes("unstable")) return "red-bg";

    return "";
}

function getConcentrationClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("defensive")) return "blue";
    if (text.includes("very high") || text.includes("high")) return "red-bg";
    if (text.includes("elevated") || text.includes("moderate")) return "yellow-bg";

    return "green-bg";
}

function formatCurrency(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "$—";
    return `$${number.toFixed(2)}`;
}

function formatCurrencyOrDash(value) {
    if (value === null || value === undefined || value === "") return "$—";
    return formatCurrency(value);
}

function formatPercent(value) {
    if (value === null || value === undefined || value === "") return "—";

    const number = Number(value);
    if (Number.isNaN(number)) return "—";
    return `${number.toFixed(2)}%`;
}

function formatShares(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return safe(value);
    return Number.isInteger(number) ? String(number) : number.toFixed(4);
}

function safe(value) {
    if (value === null || value === undefined || value === "") return "—";

    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function updateRefreshStatus() {
    const now = new Date();

    document.getElementById("refreshStatus").textContent =
        `Last refreshed ${now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;
}

loadDashboard();
</script>

</body>
</html>
