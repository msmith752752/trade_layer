<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        :root {
            --bg: #0b0f1a;
            --card: #151b2b;
            --card-soft: #0f1523;
            --border: #263044;
            --text: #ffffff;
            --muted: #9ca3af;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #facc15;
            --blue: #3b82f6;
            --purple: #a78bfa;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 35px;
        }

        .container {
            max-width: 1380px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--muted);
            margin-top: 8px;
        }

        .status-pill {
            background: #0f1523;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 12px;
            white-space: nowrap;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        .symbol {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--muted);
            margin-top: 4px;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            margin-bottom: 20px;
        }

        .badge {
            background: #1f2937;
            color: #d1d5db;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.green-bg {
            background: rgba(34,197,94,0.14);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.25);
        }

        .badge.red-bg {
            background: rgba(239,68,68,0.14);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.25);
        }

        .badge.yellow-bg {
            background: rgba(250,204,21,0.12);
            color: var(--yellow);
            border: 1px solid rgba(250,204,21,0.22);
        }

        .badge.blue-bg {
            background: rgba(59,130,246,0.14);
            color: var(--blue);
            border: 1px solid rgba(59,130,246,0.25);
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .metric-grid.two {
            grid-template-columns: repeat(2, 1fr);
        }

        .metric-grid.three {
            grid-template-columns: repeat(3, 1fr);
        }

        .metric {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .green { color: var(--green); }
        .red { color: var(--red); }
        .yellow { color: var(--yellow); }
        .blue { color: var(--blue); }
        .purple { color: var(--purple); }

        .section-title {
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: bold;
        }

        .section-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: -6px;
            margin-bottom: 16px;
            line-height: 1.45;
        }

        .why-box {
            background: var(--card-soft);
            border-left: 4px solid var(--blue);
            padding: 16px;
            border-radius: 10px;
            margin-top: 18px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .row-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .row-symbol {
            font-weight: bold;
            font-size: 17px;
        }

        .row-score {
            font-weight: bold;
        }

        .small {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .top-opportunities {
            margin-bottom: 22px;
        }

        .opportunity-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .portfolio-section {
            margin-bottom: 22px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .portfolio-card {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }

        .portfolio-card-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .account-name {
            font-size: 18px;
            font-weight: bold;
        }

        .portfolio-score-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 14px 0;
        }

        .mini-metric {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }

        .driver-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .driver-box strong {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        .account-position-group {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .account-position-group:last-child {
            margin-bottom: 0;
        }

        .account-position-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }

        .account-position-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .account-position-title {
            font-size: 18px;
            font-weight: bold;
        }

        .account-position-summary {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .account-position-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(110px, 1fr));
            gap: 10px;
            min-width: 360px;
        }

        .account-position-metric {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 10px;
        }

        .account-position-metric .label {
            margin-bottom: 5px;
            font-size: 10px;
        }

        .account-position-metric .value {
            font-size: 17px;
        }

        .recommendation-box {
            margin-top: 12px;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.18);
        }

        .recommendation-box strong {
            display: block;
            margin-bottom: 6px;
            color: var(--blue);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table.grouped {
            min-width: 720px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-top: 22px;
        }

        .positions-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 22px;
            margin-top: 22px;
        }

        .risk-field {
            margin-bottom: 14px;
        }

        .risk-field label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-input {
            width: 100%;
            padding: 12px;
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .risk-button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .risk-button:hover {
            opacity: 0.92;
        }

        .empty-state {
            background: var(--card-soft);
            border: 1px dashed var(--border);
            color: var(--muted);
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
            line-height: 1.5;
        }

        .table-wrap {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 820px;
        }

        .table.compact {
            min-width: 560px;
        }

        .table th {
            color: var(--muted);
            font-weight: normal;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(38,48,68,0.65);
        }

        .table tr:last-child td {
            border-bottom: none;
        }



        .daily-action-card {
            margin-bottom: 22px;
            border-color: rgba(59,130,246,0.34);
        }

        .daily-action-hero {
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .daily-mode-panel {
            background: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(15,21,35,0.92));
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 16px;
            padding: 18px;
        }

        .daily-mode-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .daily-mode-value {
            font-size: 34px;
            font-weight: bold;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .directive-list {
            display: grid;
            gap: 10px;
        }

        .directive-item {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: #d1d5db;
            font-size: 13px;
            line-height: 1.45;
        }

        .action-plan-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .position-action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .position-action-card {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .position-action-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .action-symbol {
            font-size: 20px;
            font-weight: bold;
        }

        .action-text {
            font-size: 13px;
            color: #d1d5db;
            line-height: 1.45;
            margin-top: 10px;
        }


        .market-driver-card {
            margin-bottom: 22px;
            border-color: rgba(34,211,238,0.28);
        }

        .market-driver-hero {
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .driver-status-panel {
            background: linear-gradient(135deg, rgba(34,211,238,0.13), rgba(15,21,35,0.94));
            border: 1px solid rgba(34,211,238,0.22);
            border-radius: 16px;
            padding: 18px;
        }

        .driver-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .driver-card-mini {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .driver-name {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .driver-signal {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .driver-impact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .driver-impact-card {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .driver-impact-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .driver-symbol {
            font-size: 20px;
            font-weight: bold;
        }

        .driver-reason-list {
            margin-top: 10px;
            display: grid;
            gap: 6px;
            color: #d1d5db;
            font-size: 12px;
            line-height: 1.35;
        }


        .capital-allocation-card {
            margin-bottom: 22px;
            border-color: rgba(167,139,250,0.32);
        }

        .capital-allocation-hero {
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .allocation-status-panel {
            background: linear-gradient(135deg, rgba(167,139,250,0.16), rgba(15,21,35,0.94));
            border: 1px solid rgba(167,139,250,0.25);
            border-radius: 16px;
            padding: 18px;
        }

        .allocation-status-value {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }

        .allocation-directive-grid {
            display: grid;
            gap: 10px;
        }

        .allocation-directive {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: #d1d5db;
            font-size: 13px;
            line-height: 1.45;
        }

        .capital-decision-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .position-decision-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .position-decision-card {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .position-decision-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .decision-symbol {
            font-size: 20px;
            font-weight: bold;
        }

        .decision-main {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .decision-rules {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }

        .decision-rule {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px;
            color: #d1d5db;
            font-size: 12px;
            line-height: 1.45;
        }

        .account-allocation-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 14px;
        }

        .account-allocation-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 12px;
        }


        .trade-recommendation-card {
            margin-bottom: 22px;
            border-color: rgba(34,197,94,0.34);
            background: linear-gradient(135deg, rgba(21,27,43,0.98), rgba(12,20,31,0.98));
        }

        .trade-recommendation-hero {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .recommendation-command-panel {
            background: linear-gradient(135deg, rgba(34,197,94,0.14), rgba(15,21,35,0.94));
            border: 1px solid rgba(34,197,94,0.24);
            border-radius: 16px;
            padding: 18px;
        }

        .recommendation-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .recommendation-symbol-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
        }

        .recommendation-symbol {
            font-size: 44px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .recommendation-expression {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }

        .recommendation-summary-box {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            color: #d1d5db;
            font-size: 13px;
            line-height: 1.5;
        }

        .recommendation-detail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .recommendation-reason-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 14px;
        }

        .recommendation-reason-panel {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .recommendation-warning-panel {
            background: rgba(250,204,21,0.08);
            border: 1px solid rgba(250,204,21,0.18);
            border-radius: 14px;
            padding: 14px;
        }


        .market-status-strip {
            background: linear-gradient(135deg, rgba(15,21,35,0.98), rgba(17,27,46,0.98));
            border: 1px solid rgba(59,130,246,0.28);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 22px;
            box-shadow: 0 18px 36px rgba(0,0,0,0.28);
        }

        .market-strip-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .market-strip-title {
            font-size: 18px;
            font-weight: bold;
        }

        .market-strip-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .market-strip-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .market-strip-item {
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            min-height: 76px;
        }

        .market-strip-symbol {
            color: #cbd5e1;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .market-strip-price {
            font-size: 18px;
            font-weight: bold;
            margin-top: 7px;
        }

        .market-strip-change {
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .top-trade-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59,130,246,0.14);
            border: 1px solid rgba(59,130,246,0.28);
            color: #93c5fd;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 8px 12px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        @media(max-width: 1100px) {
            .main-grid,
            .trade-recommendation-hero,
            .recommendation-reason-grid,
            .bottom-grid,
            .positions-grid,
            .opportunity-grid,
            .portfolio-grid,
            .daily-action-hero,
            .action-plan-grid,
            .recommendation-detail-grid,
            .position-action-grid,
            .capital-allocation-hero,
            .capital-decision-grid,
            .position-decision-grid,
            .market-driver-hero,
            .driver-grid,
            .driver-impact-grid,
            .account-allocation-grid,
            .market-strip-grid {
                grid-template-columns: repeat(2, 1fr);
            }
                grid-template-columns: repeat(2, 1fr);
            }

            .metric-grid,
            .recommendation-detail-grid,
            .metric-grid.two,
            .metric-grid.three {
                grid-template-columns: repeat(2, 1fr);
            }

            .header {
                flex-direction: column;
            }

            .account-position-header {
                flex-direction: column;
            }

            .account-position-metrics {
                min-width: 0;
                width: 100%;
            }
        }

        @media(max-width: 650px) {
            body {
                padding: 18px;
            }

            .metric-grid,
            .recommendation-detail-grid,
            .metric-grid.two,
            .metric-grid.three,
            .portfolio-score-row,
            .market-strip-grid {
                grid-template-columns: repeat(2, 1fr);
            }
                grid-template-columns: 1fr;
            }

            .symbol {
                font-size: 38px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <div>
            <h1>TradeLayer</h1>
            <p>Market interpretation + trade management workstation</p>
        </div>
        <div id="refreshStatus" class="status-pill">Loading market scan...</div>
    </div>

    <div id="dashboard"></div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";

async function loadDashboard() {
    try {
        const scanData = await fetchJson(`${API_BASE}/trade-scan`);
        const tradeLogData = await fetchJson(`${API_BASE}/trade-log`, { optional: true });
        const portfolioData = await fetchJson(`${API_BASE}/portfolio`, { optional: true });
        const portfolioAnalysisData = await fetchJson(`${API_BASE}/portfolio-analysis`, { optional: true });
        const performanceData = await fetchJson(`${API_BASE}/performance`, { optional: true });
        const dailyActionData = await fetchJson(`${API_BASE}/daily-action-plan`, { optional: true });
        const capitalAllocationData = await fetchJson(`${API_BASE}/capital-allocation-guidance`, { optional: true });
        const marketDriverData = await fetchJson(`${API_BASE}/market-driver-impact`, { optional: true });
        const marketStatusData = await fetchJson(`${API_BASE}/market-status-strip`, { optional: true });
        const tradeRecommendationData = await fetchJson(`${API_BASE}/trade-recommendations`, { optional: true });

        const top = scanData.top_trade;

        if (!top) {
            document.getElementById("dashboard").innerHTML =
                "<div class='card'>No trades found.</div>";
            updateRefreshStatus();
            return;
        }

        renderDashboard(scanData, tradeLogData, portfolioData, portfolioAnalysisData, performanceData, dailyActionData, capitalAllocationData, marketDriverData, marketStatusData, tradeRecommendationData);
        calculateRisk(top.entry, top.stop_loss, top.symbol);
        updateRefreshStatus();

    } catch (error) {
        console.error(error);
        document.getElementById("dashboard").innerHTML = `
            <div class="card">
                <div class="section-title">Unable to load TradeLayer</div>
                <div class="small">
                    Make sure the backend is running at ${API_BASE}.<br><br>
                    Expected command:<br>
                    <strong>python -m uvicorn app.main:app --reload</strong>
                </div>
            </div>
        `;
        document.getElementById("refreshStatus").textContent = "Backend not connected";
    }
}

async function fetchJson(url, options = {}) {
    try {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`${url} returned ${response.status}`);
        }

        return await response.json();

    } catch (error) {
        if (options.optional) {
            console.warn(`Optional endpoint unavailable: ${url}`, error);
            return null;
        }
        throw error;
    }
}

function renderDashboard(scanData, tradeLogData, portfolioData, portfolioAnalysisData, performanceData, dailyActionData, capitalAllocationData, marketDriverData, marketStatusData, tradeRecommendationData) {

                        <div class="label">Stop</div>

        <div class="positions-grid">

                    Live unrealized P/L calculated from current market price, share count, and cost basis.

            <div class="card">
                <div class="section-title">Closed Trades</div>

                    Completed trades and realized P/L summary.
                </div>

        </div>

        <div class="bottom-grid">
            <div class="card">
                <div class="section-title">Watchlist</div>

                    Names with potential, but not yet strong enough for top-trade status.
                </div>

                <div class="list">
                    ${renderRows(scanData.watchlist || [])}

            </div>

            <div class="card">
                <div class="section-title">Avoid / Weak Environment</div>

    `;
}

                    <div class="recommendation-symbol-row">

            <div class="recommendation-reason-grid">

                </div>
            </div>
        </div>
    `;
}

function formatExpressionLabel(value) {
    const text = String(value || "").toUpperCase();
    const labels = {
        "BULL_CALL_VERTICAL_SPREAD": "Bull Call Vertical Spread",
        "BEAR_PUT_VERTICAL_SPREAD": "Bear Put Vertical Spread",
        "LONG_CALL": "Long Call",
        "LONG_PUT": "Long Put",
        "SHARES": "Shares",
        "NO_TRADE": "No Trade"
    };

    return labels[text] || text.replaceAll("_", " ");
}

function getExpressionClass(value) {
    const text = String(value || "").toUpperCase();
    if (text.includes("BULL") || text.includes("CALL") || text === "SHARES") return "green";
    if (text.includes("BEAR") || text.includes("PUT")) return "red";
    if (text.includes("NO_TRADE")) return "yellow";
    return "blue";
}

function getConfidenceClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("high")) return "green-bg";
    if (text.includes("moderate") || text.includes("medium")) return "blue-bg";
    if (text.includes("low")) return "yellow-bg";
    return "blue-bg";
}

function renderMarketStatusStrip(data) {
    if (!data || data.status !== "ok") {
        return `
            <div class="market-status-strip">
                <div class="market-strip-top">
                    <div>
                        <div class="market-strip-title">Market Status</div>
                        <div class="market-strip-subtitle">Market status strip unavailable. Confirm /market-status-strip is running.</div>
                    </div>
                </div>
            </div>
        `;
    }

    const items = data.items || [];
    const label = data.display_mode === "futures" ? "Futures Overnight / Pre-Market" : "Live Index Pulse";

    return `
        <div class="market-status-strip">
            <div class="market-strip-top">
                <div>
                    <div class="market-strip-title">${safe(label)}</div>
                    <div class="market-strip-subtitle">${safe(data.summary)}</div>
                </div>
                <div class="badge ${data.market_session === "OPEN" ? "green-bg" : "blue-bg"}">${safe(data.market_session)}</div>
            </div>

            <div class="market-strip-grid">
                ${items.map(renderMarketStripItem).join("")}
            </div>
        </div>
    `;
}

function renderMarketStripItem(item) {
    const change = Number(item.change_percent || 0);
    const changeClass = change > 0 ? "green" : change < 0 ? "red" : "yellow";
    const directionLabel = change > 0 ? "Up today" : change < 0 ? "Down today" : "Flat / no move reported";

    return `
        <div class="market-strip-item">
            <div class="market-strip-symbol">${safe(item.label || item.symbol)}</div>
            <div class="market-strip-price">${formatMarketValue(item.price)}</div>
            <div class="market-strip-change ${changeClass}">${formatSignedPercent(item.change_percent)}</div>
            <div class="small">${safe(item.symbol)} · ${directionLabel}</div>
        </div>
    `;
}

function formatMarketValue(value) {
    if (value === null || value === undefined || value === "") return "—";
    const number = Number(value);
    if (Number.isNaN(number)) return safe(value);
    return number.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatSignedPercent(value) {
    if (value === null || value === undefined || value === "") return "—";
    const number = Number(value);
    if (Number.isNaN(number)) return safe(value);
    const sign = number > 0 ? "+" : "";
    return `${sign}${number.toFixed(2)}%`;
}

function renderMarketDriverImpact(data) {
    if (!data || data.status !== "ok") {
        return `
            <div class="card market-driver-card">
                <div class="section-title">Market Drivers & Position Impact</div>
                <div class="section-subtitle">
                    Market driver data unavailable. Confirm /market-driver-impact is running.
                </div>

        <div class="card market-driver-card">

        </div>
    `;
}

function renderMarketDriverCard(item) {
    const biasClass = getDriverBiasClass(item.bias);
    return `
        <div class="driver-card-mini">
            <div class="driver-name">${safe(item.driver)} · ${safe(item.symbol)}</div>

}

function renderPositionDriverImpactCard(item) {

function renderRecommendationDriverImpactCard(item) {
    const impactClass = getRecommendationDriverClass(item.driver_decision);
    const reasons = item.driver_reasons || [];
    return `
        <div class="driver-impact-card">
            <div class="driver-impact-top">
                <div>
                    <div class="driver-symbol">${safe(item.symbol)}</div>
                    <div class="small">${safe(item.sector)} · ${safe(item.sector_proxy)}</div>

            </div>
        </div>
    `;
}

function getDriverBiasClass(bias) {
    const value = String(bias || "").toUpperCase();
    if (["SUPPORTIVE", "SECTOR"].includes(value)) return "green";
    if (["DEFENSIVE", "CAUTION"].includes(value)) return "red";
    if (["SELECTIVE", "NEUTRAL"].includes(value)) return "blue";
    return "yellow";
}

function getDriverImpactClass(impact) {
    const value = String(impact || "").toUpperCase();
    if (value === "TAILWIND") return "green";
    if (value === "HEADWIND") return "red";
    if (value === "CAUTION") return "yellow";
    return "blue";
}

function getRecommendationDriverClass(decision) {
    const value = String(decision || "").toUpperCase();
    if (value === "DRIVER CONFIRMED") return "green";
    if (value === "DRIVER CONFLICT") return "red";
    return "blue";
}

                </div>

function buildAnalysisByAccount(portfolioAnalysisData) {
    const accounts = portfolioAnalysisData?.portfolio_analyses || [];
    const map = {};

    accounts.forEach(account => {
        if (account.account) {
            map[account.account] = account;
        }
    });

    return map;
}

function groupPositionsByAccount(items) {
    const grouped = {};

    items.forEach(item => {
        const accountName = getFirstValue(item, ["account", "account_type"], "Uncategorized");

        if (!grouped[accountName]) {
            grouped[accountName] = [];
        }

        grouped[accountName].push(item);
    });

    return Object.fromEntries(
        Object.entries(grouped).sort(([accountA], [accountB]) => {
            const orderA = getAccountSortRank(accountA);
            const orderB = getAccountSortRank(accountB);

            if (orderA !== orderB) {
                return orderA - orderB;
            }

            return accountA.localeCompare(accountB);
        })
    );
}

function getAccountSortRank(accountName) {
    const text = String(accountName || "").toLowerCase();

    if (text.includes("ira 823")) return 1;
    if (text.includes("roth")) return 2;
    if (text.includes("individual")) return 3;
    if (text.includes("hsa")) return 4;
    if (text.includes("paper")) return 5;

    return 9;
}

function calculateAccountPositionStats(items) {
    let marketValue = 0;
    let openPL = 0;
    let basis = 0;

    items.forEach(item => {
        const value = Number(getFirstValue(item, ["market_value", "position_value", "value"], 0));
        const pnl = Number(getFirstValue(item, ["unrealized_pl", "unrealized_p_l", "p_l", "pl", "unrealized"], 0));
        const totalBasis = Number(getFirstValue(item, ["total_basis", "cost_basis_total"], null));
        const shares = Math.abs(Number(getFirstValue(item, ["shares", "quantity", "qty"], 0)));
        const cost = Number(getFirstValue(item, ["cost_basis", "entry", "price", "buy_price"], 0));

        if (!Number.isNaN(value)) {
            marketValue += value;
        }

        if (!Number.isNaN(pnl)) {
            openPL += pnl;
        }

        if (totalBasis !== null && !Number.isNaN(totalBasis)) {
            basis += Math.abs(totalBasis);
        } else if (!Number.isNaN(shares) && !Number.isNaN(cost)) {
            basis += shares * cost;
        }
    });

    const openPLPercent = basis ? (openPL / basis) * 100 : 0;

    return {
        marketValue,
        openPL,
        openPLPercent,
        basis,
    };
}

function getAccountModeFromPositions(items, analysis) {
    if (analysis?.portfolio_mode) {
        return analysis.portfolio_mode;
    }

    for (const item of items) {
        if (item.portfolio_mode) {
            return item.portfolio_mode;
        }
    }

    return "real";
}

function getRecommendationClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("reduce") || text.includes("avoid") || text.includes("raise")) {
        return "red-bg";

    if (text.includes("monitor") || text.includes("rebalance")) {
        return "yellow-bg";

    return "green-bg";
}

function getRecommendationTextClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("reduce") || text.includes("avoid") || text.includes("raise")) {
        return "red";
    }

    if (text.includes("monitor") || text.includes("rebalance")) {
        return "yellow";
    }

    return "green";
}

function renderClosedTrades(tradeLogData, performanceData) {
    const loggedTrades = normalizeTradeLog(tradeLogData);
    const closedItems = loggedTrades.filter(t => isClosedTrade(t));

    let totalRealized = getFirstValue(
        performanceData || {},
        ["total_realized_pl", "realized_pl", "total_pl", "total_p_l"],
        null
    );

    const calculatedRealized = closedItems.reduce((sum, trade) => {
        const pnl = Number(getFirstValue(trade, ["realized_pl", "realized_p_l", "p_l", "pl"], 0));
        return Number.isNaN(pnl) ? sum : sum + pnl;
    }, 0);

    if (totalRealized === null || Number(totalRealized) === 0) {
        totalRealized = calculatedRealized;
    }

    if (closedItems.length === 0 && totalRealized === null) {
        return `<div class="empty-state">No closed trades found yet.</div>`;
    }

    return `
        <div class="metric-grid two">
            <div class="metric">
                <div class="label">Realized P/L</div>
                <div class="value ${getPnlClass(totalRealized)}">${formatCurrencyOrDash(totalRealized)}</div>
            </div>

            <div class="metric">
                <div class="label">Closed Trades</div>
                <div class="value">${closedItems.length}</div>
            </div>
        </div>

        ${closedItems.length > 0 ? `
            <div class="table-wrap">
                <table class="table compact">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Symbol</th>
                            <th>Exit</th>
                            <th>Realized P/L</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${closedItems.map(item => {
                            const pnl = getFirstValue(item, ["realized_pl", "realized_p_l", "p_l", "pl"]);
                            return `
                                <tr>
                                    <td>${safe(getFirstValue(item, ["account", "account_type"], "—"))}</td>
                                    <td><strong>${safe(item.symbol)}</strong></td>
                                    <td>${formatCurrency(getFirstValue(item, ["sale_price", "sell_price", "exit_price", "exit", "price"]))}</td>
                                    <td class="${getPnlClass(pnl)}">${formatCurrencyOrDash(pnl)}</td>
                                </tr>
                            `;
                        }).join("")}
                    </tbody>
                </table>
            </div>
        ` : ""}
    `;
}

function renderOpportunityCards(items) {
    if (!items || items.length === 0) {
        return `<div class="empty-state">No top opportunities returned.</div>`;
    }

    return items.slice(0, 4).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${safe(item.symbol)}</div>
                    <div class="row-score">${safe(item.score)}</div>
                </div>

                <div class="small">${safe(item.market_state)}</div>
                <div class="small">${safe(item.recommended_strategy)}</div>

                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${formatPercent(item.relative_strength_vs_spy)}
                    </span>
                </div>

                <div class="small">
                    Entry: ${formatCurrency(item.entry)}
                    |
                    Target: ${formatCurrency(item.target)}
                </div>
            </div>
        `;
    }).join("");
}

function renderRows(items) {
    if (!items || items.length === 0) {
        return `<div class="empty-state">No names returned for this section.</div>`;
    }

    return items.slice(0, 6).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${safe(item.symbol)}</div>
                    <div class="row-score">${safe(item.score)}</div>
                </div>

                <div class="small">${safe(item.market_state)}</div>
                <div class="small">${safe(item.recommended_strategy)}</div>

                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${formatPercent(item.relative_strength_vs_spy)}
                    </span>
                </div>
            </div>
        `;
    }).join("");
}

function renderReasonList(reasons) {
    if (!reasons || reasons.length === 0) {
        return `<div class="small">No strategy explanation returned yet.</div>`;
    }

    return reasons.map(r => `<div class="small">• ${safe(r)}</div>`).join("");
}

function renderMiniList(items) {
    if (!items || items.length === 0) {
        return `<div class="small">—</div>`;
    }

    return items.slice(0, 3).map(item => `<div class="small">• ${safe(item)}</div>`).join("");
}

function normalizeTradeLog(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (Array.isArray(data.trades)) return data.trades;
    if (Array.isArray(data.trade_log)) return data.trade_log;

    if (Array.isArray(data.open_trades) || Array.isArray(data.closed_trades)) {
        return [
            ...(data.open_trades || []),
            ...(data.closed_trades || [])
        ];
    }

    return [];
}

function normalizeArray(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value;
    return [];
}

function isOpenTrade(trade) {
    const status = String(getFirstValue(trade, ["status", "trade_status"], "")).toLowerCase();
    const action = String(getFirstValue(trade, ["action"], "")).toLowerCase();

    if (status.includes("open")) return true;
    if (status.includes("closed")) return false;
    if (action.includes("buy") && !action.includes("sell")) return true;

    return false;
}

function isClosedTrade(trade) {
    const status = String(getFirstValue(trade, ["status", "trade_status"], "")).toLowerCase();
    const action = String(getFirstValue(trade, ["action"], "")).toLowerCase();
    const realized = getFirstValue(trade, ["realized_pl", "realized_p_l", "p_l", "pl"], null);

    if (status.includes("closed")) return true;
    if (action.includes("sell")) return true;
    if (realized !== null && realized !== undefined) return true;

    return false;
}

function getPositionGuidance(item, pnl) {
    const guidance = getFirstValue(item, ["guidance", "position_guidance", "recommendation"]);

    if (guidance) return guidance;

    const pnlNumber = Number(pnl);

    if (!Number.isNaN(pnlNumber)) {
        if (pnlNumber > 0) return "hold_position / monitor target";
        if (pnlNumber < 0) return "review stop / avoid adding";
    }

    return "hold_position / monitor setup";
}

function getFirstValue(object, keys, fallback = null) {
    if (!object) return fallback;

    for (const key of keys) {
        if (object[key] !== undefined && object[key] !== null && object[key] !== "") {
            return object[key];
        }
    }

    return fallback;
}

function getRsClass(value) {
    const number = Number(value);
    if (number >= 1) return "green";
    if (number <= -1) return "red";
    return "yellow";
}

function getPnlClass(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "";
    if (number > 0) return "green";
    if (number < 0) return "red";
    return "yellow";
}

function getEnvironmentClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("unstable") || text.includes("avoid") || text.includes("high_risk")) {
        return "red-bg";
    }

    if (text.includes("watch") || text.includes("neutral") || text.includes("mixed")) {
        return "yellow-bg";
    }

    return "green-bg";
}

function getHealthClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("strong") || text.includes("stable")) return "green-bg";
    if (text.includes("mixed") || text.includes("elevated")) return "yellow-bg";
    if (text.includes("high risk")) return "red-bg";

    return "";
}

function getStabilityClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("highly stable") || text === "stable") return "green-bg";
    if (text.includes("moderately")) return "yellow-bg";
    if (text.includes("unstable")) return "red-bg";

    return "";
}

function getConcentrationClass(value) {
    const text = String(value || "").toLowerCase();

    if (text.includes("defensive")) return "blue";
    if (text.includes("very high") || text.includes("high")) return "red-bg";
    if (text.includes("elevated") || text.includes("moderate")) return "yellow-bg";

    return "green-bg";
}


function getDailyModeClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("aggressive")) return "green";
    if (text.includes("selective")) return "blue";
    if (text.includes("defensive")) return "yellow";
    if (text.includes("preservation")) return "red";
    return "blue";
}

function getPermissionClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("allowed") && !text.includes("avoid")) return "green-bg";
    if (text.includes("selective")) return "blue-bg";
    if (text.includes("restricted")) return "yellow-bg";
    if (text.includes("avoid")) return "red-bg";
    return "";
}

function getPressureClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("supportive")) return "green";
    if (text.includes("mixed")) return "yellow";
    if (text.includes("elevated")) return "yellow";
    if (text.includes("high")) return "red";
    return "blue";
}

function getPostureClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("stable")) return "green";
    if (text.includes("balanced")) return "blue";
    if (text.includes("mixed")) return "yellow";
    if (text.includes("fragile")) return "red";
    return "blue";
}

function getPriorityClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("urgent")) return "red-bg";
    if (text.includes("manage")) return "yellow-bg";
    if (text.includes("monitor")) return "";
    return "green-bg";
}

function getAllocationStatusClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("selective deployment")) return "green";
    if (text.includes("hold")) return "blue";
    if (text.includes("restricted")) return "yellow";
    if (text.includes("maintenance")) return "red";
    return "blue";
}

function getMarketBiasClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("supportive")) return "green-bg";
    if (text.includes("selective")) return "blue-bg";
    if (text.includes("cautious")) return "yellow-bg";
    if (text.includes("defensive")) return "red-bg";
    return "";
}

function getMarketBiasTextClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("supportive")) return "green";
    if (text.includes("selective")) return "blue";
    if (text.includes("cautious")) return "yellow";
    if (text.includes("defensive")) return "red";
    return "blue";
}

function getDecisionTextClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("add")) return "green";
    if (text.includes("trail") || text === "hold") return "blue";
    if (text.includes("do not add")) return "yellow";
    if (text.includes("reduce") || text.includes("exit")) return "red";
    return "blue";
}

function getPressureScoreClass(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "blue";
    if (number >= 70) return "red";
    if (number >= 45) return "yellow";
    return "green";
}

function getAddPermissionClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("selective")) return "green-bg";
    if (text.includes("pullback") || text.includes("wait")) return "blue-bg";
    if (text.includes("do not")) return "red-bg";
    return "";
}

function getReducePermissionClass(value) {
    const text = String(value || "").toLowerCase();
    if (text.includes("reduce") || text.includes("exit")) return "red-bg";
    if (text.includes("weakens") || text.includes("trim")) return "yellow-bg";
    if (text.includes("no reduce")) return "green-bg";
    return "";
}


function formatScoreOutOf100(value) {
    if (value === null || value === undefined || value === "") return "—";

    const number = Number(value);
    if (Number.isNaN(number)) return safe(value);

    return `${Math.round(number)} / 100`;
}

function getDriverQualityLabel(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "Confirmation unavailable";

    if (number >= 80) return "Strong driver confirmation";
    if (number >= 65) return "Moderate confirmation";
    if (number >= 50) return "Mixed confirmation";
    if (number >= 35) return "Weak confirmation";
    return "Driver conflict";
}

function getDriverQualityTextClass(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return "blue";

    if (number >= 80) return "green";
    if (number >= 65) return "blue";
    if (number >= 50) return "yellow";
    return "red";
}

function formatCurrency(value) {
    if (value === null || value === undefined || value === "") return "$—";

    const number = Number(value);
    if (Number.isNaN(number)) return "$—";

    const absoluteValue = Math.abs(number).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
    });

    return number < 0 ? `-$${absoluteValue}` : `$${absoluteValue}`;
}

function formatCurrencyOrDash(value) {
    if (value === null || value === undefined || value === "") return "$—";
    return formatCurrency(value);
}

function formatPercent(value) {
    if (value === null || value === undefined || value === "") return "—";

    const number = Number(value);
    if (Number.isNaN(number)) return "—";
    return `${number.toFixed(2)}%`;
}

function formatShares(value) {
    const number = Number(value);
    if (Number.isNaN(number)) return safe(value);
    return Number.isInteger(number) ? String(number) : number.toFixed(4);
}

function safe(value) {
    if (value === null || value === undefined || value === "") return "—";

    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function updateRefreshStatus() {
    const now = new Date();

    document.getElementById("refreshStatus").textContent =
        `Last refreshed ${now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;
}

loadDashboard();
</script>

</html>
