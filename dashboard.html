<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 35px;
        }

        .container {
            max-width: 1250px;
            margin: auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 34px;
        }

        .header p {
            color: #9ca3af;
            margin-top: 8px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .card {
            background: #151b2b;
            border: 1px solid #263044;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        .symbol {
            font-size: 48px;
            font-weight: bold;
        }

        .subtitle {
            color: #9ca3af;
            margin-top: 4px;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            margin-bottom: 20px;
        }

        .badge {
            background: #1f2937;
            color: #d1d5db;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .metric {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 14px;
            padding: 16px;
        }

        .label {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .yellow { color: #facc15; }

        .section-title {
            margin-bottom: 14px;
            font-size: 18px;
        }

        .why-box {
            background: #0f1523;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 10px;
            margin-top: 18px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 12px;
            padding: 14px;
        }

        .row-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .row-symbol {
            font-weight: bold;
            font-size: 17px;
        }

        .row-score {
            font-weight: bold;
        }

        .small {
            color: #9ca3af;
            font-size: 13px;
            line-height: 1.45;
        }

        .top-opportunities {
            margin-bottom: 22px;
        }

        .opportunity-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-top: 22px;
        }

        @media(max-width: 1000px) {
            .main-grid,
            .bottom-grid,
            .opportunity-grid {
                grid-template-columns: 1fr;
            }

            .metric-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>TradeLayer</h1>
        <p>Market structure + options strategy dashboard</p>
    </div>

    <div id="dashboard"></div>
</div>

<script>

async function loadDashboard() {
    const response = await fetch("http://127.0.0.1:8000/trade-scan");
    const data = await response.json();

    const top = data.top_trade;

    if (!top) {
        document.getElementById("dashboard").innerHTML =
            "<div class='card'>No trades found.</div>";
        return;
    }

    let rsClass = getRsClass(top.relative_strength_vs_spy);

    document.getElementById("dashboard").innerHTML = `

        <div class="main-grid">

            <div class="card">
                <div class="symbol">${top.symbol}</div>
                <div class="subtitle">${top.market_state}</div>

                <div class="badge-row">
                    <div class="badge">${top.action_label}</div>
                    <div class="badge">${top.recommended_strategy}</div>
                    <div class="badge">${top.options_pressure}</div>
                </div>

                <div class="metric-grid">
                    <div class="metric">
                        <div class="label">Entry</div>
                        <div class="value">$${top.entry}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Target</div>
                        <div class="value green">$${top.target}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Stop</div>
                        <div class="value red">$${top.stop_loss}</div>
                    </div>

                    <div class="metric">
                        <div class="label">Score</div>
                        <div class="value">${top.score}</div>
                    </div>

                    <div class="metric">
                        <div class="label">RS vs SPY</div>
                        <div class="value ${rsClass}">${top.relative_strength_vs_spy}%</div>
                    </div>

                    <div class="metric">
                        <div class="label">Expected Hold</div>
                        <div class="value">${top.expected_hold}</div>
                    </div>
                </div>

                <div class="why-box">
                    <div class="section-title">Why This Strategy</div>
                    ${(top.strategy_reason || [])
                        .map(r => `<div class="small">• ${r}</div>`)
                        .join("")}
                </div>
            </div>

            <div class="card">
                <div class="section-title">Trade Summary</div>

                <div class="small">
                    <strong>Market State:</strong><br>
                    ${top.state_reason}
                </div>

                <br>

                <div class="small">
                    <strong>Rank Reason:</strong><br>
                    ${top.rank_reason}
                </div>

                <br>

                <div class="small">
                    <strong>Exit Rule:</strong><br>
                    ${top.exit_rule}
                </div>

                <br>

                <div class="small">
                    <strong>Options Summary:</strong><br>
                    ${top.options_summary}
                </div>
            </div>

        </div>

        <div class="card top-opportunities">
            <div class="section-title">Top Opportunities</div>
            <div class="opportunity-grid">
                ${renderOpportunityCards(data.trade_opportunities)}
            </div>
        </div>

        <div class="bottom-grid">
            <div class="card">
                <div class="section-title">Watchlist</div>
                <div class="list">
                    ${renderRows(data.watchlist)}
                </div>
            </div>

            <div class="card">
                <div class="section-title">Avoid / Weak Environment</div>
                <div class="list">
                    ${renderRows(data.avoid)}
                </div>
            </div>
        </div>
    `;
}

function getRsClass(value) {
    if (value >= 1) return "green";
    if (value <= -1) return "red";
    return "yellow";
}

function renderOpportunityCards(items) {
    return items.slice(0, 4).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${item.symbol}</div>
                    <div class="row-score">${item.score}</div>
                </div>

                <div class="small">${item.market_state}</div>
                <div class="small">${item.recommended_strategy}</div>
                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${item.relative_strength_vs_spy}%
                    </span>
                </div>
                <div class="small">Entry: $${item.entry} | Target: $${item.target}</div>
            </div>
        `;
    }).join("");
}

function renderRows(items) {
    return items.slice(0, 6).map(item => {
        return `
            <div class="row">
                <div class="row-top">
                    <div class="row-symbol">${item.symbol}</div>
                    <div class="row-score">${item.score}</div>
                </div>

                <div class="small">${item.market_state}</div>
                <div class="small">${item.recommended_strategy}</div>
                <div class="small">
                    RS vs SPY:
                    <span class="${getRsClass(item.relative_strength_vs_spy)}">
                        ${item.relative_strength_vs_spy}%
                    </span>
                </div>
            </div>
        `;
    }).join("");
}

loadDashboard();

</script>

</body>
</html>
