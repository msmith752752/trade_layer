<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 34px;
        }

        .header p {
            color: #9ca3af;
            margin: 0;
            font-size: 15px;
        }

        .card {
            background: #151b2b;
            border: 1px solid #263044;
            padding: 30px;
            border-radius: 18px;
            max-width: 620px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .symbol {
            font-size: 44px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .badge {
            padding: 8px 14px;
            border-radius: 999px;
            background: #20304a;
            color: #8fd3ff;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .metric-box {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 14px;
            padding: 16px;
            text-align: left;
        }

        .label {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 22px;
        }

        .detail-pill {
            background: #101827;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: #d1d5db;
            font-size: 14px;
        }

        .reason {
            background: #0f1523;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 10px;
            color: #d1d5db;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            margin-bottom: 22px;
        }

        .track-section {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 14px;
            padding: 18px;
            text-align: left;
        }

        .track-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0b0f1a;
            color: white;
            font-size: 15px;
        }

        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .message {
            margin-top: 12px;
            color: #9ca3af;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>TradeLayer</h1>
            <p>Top ranked trade setup from live market scan</p>
        </div>

        <div id="tradeCard" class="card">
            <div class="loading">Loading top trade...</div>
        </div>
    </div>

    <script>
        let currentTrade = null;

        async function loadTrade() {
            const response = await fetch("http://127.0.0.1:8000/trade-scan");
            const data = await response.json();

            const trade = data.top_trade;
            currentTrade = trade;

            if (!trade) {
                document.getElementById("tradeCard").innerHTML = `
                    <div class="loading">No qualified trades found.</div>
                `;
                return;
            }

            document.getElementById("tradeCard").innerHTML = `
                <div class="top-row">
                    <div>
                        <div class="label">Top Trade</div>
                        <div class="symbol">${trade.symbol}</div>
                    </div>
                    <div class="badge">${trade.confidence} confidence</div>
                </div>

                <div class="metric-grid">
                    <div class="metric-box">
                        <div class="label">Entry</div>
                        <div class="value">$${trade.entry}</div>
                    </div>

                    <div class="metric-box">
                        <div class="label">Target</div>
                        <div class="value">$${trade.target}</div>
                    </div>

                    <div class="metric-box">
                        <div class="label">Stop Loss</div>
                        <div class="value">$${trade.stop_loss}</div>
                    </div>
                </div>

                <div class="details">
                    <div class="detail-pill">Score: ${trade.score}</div>
                    <div class="detail-pill">Risk/Reward: ${trade.risk_reward}</div>
                    <div class="detail-pill">${trade.strategy}</div>
                </div>

                <div class="reason">
                    <strong>Why this trade:</strong><br>
                    ${trade.reason}
                </div>

                <div class="track-section">
                    <div class="label">Track this trade manually</div>
                    <div class="track-row">
                        <input id="sharesInput" type="number" min="1" placeholder="Enter shares">
                        <button onclick="trackTrade()">Track Trade</button>
                    </div>
                    <div id="trackMessage" class="message"></div>
                </div>
            `;
        }

        async function trackTrade() {
            const shares = Number(document.getElementById("sharesInput").value);
            const message = document.getElementById("trackMessage");

            if (!currentTrade) {
                message.innerText = "No trade available to track.";
                return;
            }

            if (!shares || shares <= 0) {
                message.innerText = "Enter a valid share amount first.";
                return;
            }

            const tradeToLog = {
                symbol: currentTrade.symbol,
                entry: currentTrade.entry,
                stop_loss: currentTrade.stop_loss,
                target: currentTrade.target,
                shares: shares,
                status: "open",
                source: "TradeLayer dashboard"
            };

            const response = await fetch("http://127.0.0.1:8000/log-trade", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(tradeToLog)
            });

            if (response.ok) {
                message.innerText = `Tracked ${shares} shares of ${currentTrade.symbol}.`;
                document.getElementById("sharesInput").value = "";
            } else {
                message.innerText = "Could not track trade. Check backend terminal.";
            }
        }

        loadTrade();
    </script>

</body>
</html>
