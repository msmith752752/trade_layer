<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TradeLayer Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 34px;
        }

        .header p {
            color: #9ca3af;
            margin: 0;
            font-size: 15px;
        }

        .card {
            background: #151b2b;
            border: 1px solid #263044;
            padding: 30px;
            border-radius: 18px;
            max-width: 620px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
            margin-bottom: 30px;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .symbol {
            font-size: 44px;
            font-weight: bold;
        }

        .badge {
            padding: 8px 14px;
            border-radius: 999px;
            background: #20304a;
            color: #8fd3ff;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .metric-box {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 14px;
            padding: 16px;
        }

        .label {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 22px;
        }

        .detail-pill {
            background: #101827;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: #d1d5db;
            font-size: 14px;
        }

        .reason {
            background: #0f1523;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 22px;
        }

        .track-section {
            background: #0f1523;
            border: 1px solid #263044;
            border-radius: 14px;
            padding: 18px;
        }

        .track-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0b0f1a;
            color: white;
        }

        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .message {
            margin-top: 12px;
            color: #9ca3af;
        }

        .loading {
            text-align: center;
            color: #9ca3af;
        }

        /* NEW TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #263044;
        }

        th {
            color: #9ca3af;
            font-size: 13px;
        }

        .profit {
            color: #22c55e;
            font-weight: bold;
        }

        .loss {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>TradeLayer</h1>
        <p>Top ranked trade setup from live market scan</p>
    </div>

    <div id="tradeCard" class="card">
        <div class="loading">Loading top trade...</div>
    </div>

    <!-- NEW SECTION -->
    <div id="myTrades" class="card">
        <div class="loading">Loading your trades...</div>
    </div>

</div>

<script>
let currentTrade = null;

async function loadTrade() {
    const response = await fetch("http://127.0.0.1:8000/trade-scan");
    const data = await response.json();

    const trade = data.top_trade;
    currentTrade = trade;

    if (!trade) {
        document.getElementById("tradeCard").innerHTML = `
            <div class="loading">No qualified trades found.</div>
        `;
        return;
    }

    document.getElementById("tradeCard").innerHTML = `
        <div class="top-row">
            <div>
                <div class="label">Top Trade</div>
                <div class="symbol">${trade.symbol}</div>
            </div>
            <div class="badge">${trade.confidence} confidence</div>
        </div>

        <div class="metric-grid">
            <div class="metric-box">
                <div class="label">Entry</div>
                <div class="value">$${trade.entry}</div>
            </div>
            <div class="metric-box">
                <div class="label">Target</div>
                <div class="value">$${trade.target}</div>
            </div>
            <div class="metric-box">
                <div class="label">Stop</div>
                <div class="value">$${trade.stop_loss}</div>
            </div>
        </div>

        <div class="track-section">
            <div class="label">Track this trade</div>
            <div class="track-row">
                <input id="sharesInput" type="number" placeholder="Shares">
                <button onclick="trackTrade()">Track</button>
            </div>
            <div id="trackMessage" class="message"></div>
        </div>
    `;
}

async function trackTrade() {
    const shares = Number(document.getElementById("sharesInput").value);
    const message = document.getElementById("trackMessage");

    const tradeToLog = {
        symbol: currentTrade.symbol,
        entry: currentTrade.entry,
        stop_loss: currentTrade.stop_loss,
        target: currentTrade.target,
        shares: shares,
        status: "open"
    };

    await fetch("http://127.0.0.1:8000/log-trade", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(tradeToLog)
    });

    message.innerText = "Trade tracked.";
    loadMyTrades(); // refresh
}

async function loadMyTrades() {
    const res = await fetch("http://127.0.0.1:8000/trade-log");
    const trades = await res.json();

    if (!trades.length) {
        document.getElementById("myTrades").innerHTML =
            "<div class='loading'>No trades yet.</div>";
        return;
    }

    let rows = "";

    for (let t of trades) {
        const currentPrice = t.entry; // placeholder for now
        const pl = (currentPrice - t.entry) * t.shares;

        const plClass = pl >= 0 ? "profit" : "loss";

        rows += `
            <tr>
                <td>${t.symbol}</td>
                <td>${t.shares}</td>
                <td>$${t.entry}</td>
                <td>$${currentPrice}</td>
                <td class="${plClass}">$${pl.toFixed(2)}</td>
                <td>${t.status}</td>
            </tr>
        `;
    }

    document.getElementById("myTrades").innerHTML = `
        <div class="label">My Trades</div>
        <table>
            <tr>
                <th>Symbol</th>
                <th>Shares</th>
                <th>Entry</th>
                <th>Current</th>
                <th>P/L</th>
                <th>Status</th>
            </tr>
            ${rows}
        </table>
    `;
}

loadTrade();
loadMyTrades();
</script>

</body>
</html>
